services:
  - type: web
    name: contractguard-backend
    runtime: python
    plan: free
    healthCheckPath: /
    buildCommand: pip install -r requirements-backend.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT --app-dir .
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: contractguard-frontend
    runtime: python
    plan: free
    healthCheckPath: /
    buildCommand: pip install -r requirements-frontend.txt
    startCommand: streamlit run frontend/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: API_BASE_URL
        sync: false
